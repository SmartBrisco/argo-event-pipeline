apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: argo-workflows
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
      - name: ollama
        image: ollama/ollama:latest
        resources:
          requests:
            memory: "2Gi"
            cpu: "500m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        ports:
        - containerPort: 11434
---
apiVersion: v1        
kind: Service
metadata:
  name: ollama-svc
  namespace: argo-workflows
spec:
  selector:
    app: ollama
  ports:
    - protocol: TCP
      port: 11434
      targetPort: 11434